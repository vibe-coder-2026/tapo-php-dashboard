name: Publish Docker image

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY || 'ghcr.io' }}
          username: ${{ secrets.REGISTRY_USER || github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ vars.REGISTRY_IMAGE || 'ghcr.io/vibe-coder-2026/tapo-php-dashboard' }}:latest
            ${{ vars.REGISTRY_IMAGE || 'ghcr.io/vibe-coder-2026/tapo-php-dashboard' }}:${{ github.event.release.tag_name || github.ref_name }}
