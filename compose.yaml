name: tapo-dashboard
services:
  tapo-dashboard:
    container_name: tapo-dashboard
    image: "ghcr.io/vibe-coder-2026/tapo-php-dashboard:${IMAGE_TAG:-latest}"
    build: .
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - ./.env:/app/.env:ro
      - ./devices.json:/app/devices.json:ro
      - energy-data:/app/data
    stop_grace_period: 15s

volumes:
  energy-data:
